<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE Rafael Uribe Uribe - Selección de Temas Guerra Fría</title>
    <style>
        :root {
            --primary-color: #0054a6;
            --secondary-color: #e50000;
            --accent-color: #ffcc00;
            --light-gray: #f8f8f8;
            --dark-gray: #333;
            --medium-gray: #666;
            --white: #fff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: var(--light-gray);
            color: var(--dark-gray);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        header {
            background-color: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-top {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 10px 0;
        }
        
        .header-top .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
        }
        
        .logo img {
            max-height: 80px;
            margin-right: 15px;
        }
        
        .logo-text h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .logo-text p {
            font-size: 14px;
            color: var(--medium-gray);
        }
        
        main {
            padding: 40px 0;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }
        
        .section-title h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .section-title p {
            font-size: 16px;
            color: var(--medium-gray);
        }
        
        .form-container {
            background-color: var(--white);
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--dark-gray);
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
            width: 100%;
            margin-top: 20px;
        }
        
        button:hover {
            background-color: #003d7a;
        }
        
        .reset-btn {
            background-color: var(--secondary-color);
            margin-top: 10px;
        }
        
        .reset-btn:hover {
            background-color: #cc0000;
        }
        
        .success-message {
            background-color: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            display: none;
        }
        
        footer {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 30px 0;
            text-align: center;
        }
        
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .footer-logo {
            max-height: 60px;
            margin-bottom: 20px;
        }
        
        .footer-links {
            margin-bottom: 20px;
        }
        
        .footer-links a {
            color: var(--white);
            margin: 0 10px;
            text-decoration: none;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .footer-bottom {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        @media (max-width: 768px) {
            .header-main {
                flex-direction: column;
                text-align: center;
            }
            
            .logo {
                margin-bottom: 15px;
                flex-direction: column;
            }
            
            .logo img {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
